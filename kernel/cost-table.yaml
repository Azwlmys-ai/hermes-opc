# =============================================================================
# Hermes v0.1 — Provider Cost Table
# Prices in USD per 1,000,000 tokens (input / output).
# Used by CostGuard for pre-flight estimation and post-call accounting.
# Last updated: 2026-05-12
# =============================================================================

providers:

  # --- Anthropic (IMPLEMENTED in v0.1) --------------------------------------

  anthropic:
    implemented: true
    base_url: "https://api.anthropic.com"
    models:

      - id: "claude-opus-4-7"
        input_per_1m_usd: 15.00
        output_per_1m_usd: 75.00
        cache_read_per_1m_usd: 1.50   # Prompt cache read discount
        cache_write_per_1m_usd: 18.75 # Prompt cache write surcharge
        context_window: 200000
        notes: "Highest capability; use only for architecture decisions"

      - id: "claude-sonnet-4-6"
        input_per_1m_usd: 3.00
        output_per_1m_usd: 15.00
        cache_read_per_1m_usd: 0.30
        cache_write_per_1m_usd: 3.75
        context_window: 200000
        notes: "Default model for v0.1. Best cost/capability balance"

      - id: "claude-haiku-4-5"
        input_per_1m_usd: 0.80
        output_per_1m_usd: 4.00
        cache_read_per_1m_usd: 0.08
        cache_write_per_1m_usd: 1.00
        context_window: 200000
        notes: "Use for low-complexity tasks (doc writing, simple edits)"

  # --- OpenAI (reserved, NOT implemented in v0.1) ---------------------------

  openai:
    implemented: false
    base_url: "https://api.openai.com/v1"
    models:

      - id: "gpt-4o"
        input_per_1m_usd: 2.50
        output_per_1m_usd: 10.00
        context_window: 128000

      - id: "gpt-4o-mini"
        input_per_1m_usd: 0.15
        output_per_1m_usd: 0.60
        context_window: 128000

      - id: "o3"
        input_per_1m_usd: 10.00
        output_per_1m_usd: 40.00
        context_window: 200000
        notes: "Reasoning model; high cost"

  # --- Google (reserved, NOT implemented in v0.1) ---------------------------

  google:
    implemented: false
    base_url: "https://generativelanguage.googleapis.com"
    models:

      - id: "gemini-2.5-pro"
        input_per_1m_usd: 1.25
        output_per_1m_usd: 10.00
        context_window: 1000000
        notes: "Best for long-context research tasks"

      - id: "gemini-2.0-flash"
        input_per_1m_usd: 0.10
        output_per_1m_usd: 0.40
        context_window: 1000000
        notes: "Cheapest option for simple tasks"

  # --- xAI / Grok (reserved, NOT implemented in v0.1) ----------------------

  xai:
    implemented: false
    base_url: "https://api.x.ai/v1"
    models:

      - id: "grok-3"
        input_per_1m_usd: 3.00
        output_per_1m_usd: 15.00
        context_window: 131072

      - id: "grok-3-mini"
        input_per_1m_usd: 0.30
        output_per_1m_usd: 0.50
        context_window: 131072

  # --- OpenAI-compatible relay (IMPLEMENTED in v0.1) -----------------------
  # Covers PawMaaS / OpenRouter / OneAPI / NewAPI / LiteLLM etc.
  # Prices are upstream list prices — actual relay pricing may differ.
  # Set implemented: true so loadCostTable() includes these models.

  openai-compatible:
    implemented: true
    base_url: "https://api.pawmaas.cn/v1"
    notes: "Generic relay; baseURL overridden by OPENAI_BASE_URL at runtime"
    models:

      - id: "grok-4-1-fast-reasoning"
        input_per_1m_usd: 0.00
        output_per_1m_usd: 0.00
        context_window: 131072
        notes: "PawMaaS relay model; real pricing unknown; set to 0 until billing data is confirmed"

      - id: "grok-4.3"
        input_per_1m_usd: 3.00
        output_per_1m_usd: 15.00
        context_window: 131072
        notes: "Relay model; pricing follows upstream provider"

      - id: "gpt-5.4-mini-2026-03-17"
        input_per_1m_usd: 0.15
        output_per_1m_usd: 0.60
        context_window: 128000
        notes: "Cheapest relay model for low-complexity tasks"

      - id: "gpt-4o"
        input_per_1m_usd: 2.50
        output_per_1m_usd: 10.00
        context_window: 128000

      - id: "claude-sonnet-4-6"
        input_per_1m_usd: 3.00
        output_per_1m_usd: 15.00
        context_window: 200000
        notes: "Claude via relay — different billing than direct Anthropic"

      - id: "gemini-2.5-pro"
        input_per_1m_usd: 1.25
        output_per_1m_usd: 10.00
        context_window: 1000000

      - id: "deepseek-r1"
        input_per_1m_usd: 0.55
        output_per_1m_usd: 2.19
        context_window: 64000

